<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Automoción - Gestión de vehículos</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f7fb;
      color: #1f2937;
    }

    .hidden {
      display: none !important;
    }

    .box {
      max-width: 1100px;
      margin: 24px auto;
      background: white;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      overflow: hidden;
    }

    .header {
      background: #2563eb;
      color: white;
      padding: 20px;
    }

    .header h2 {
      margin: 0 0 6px;
    }

    .header p {
      margin: 0;
      opacity: 0.95;
    }

    .content {
      padding: 20px;
    }

    input, button, textarea, select {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 10px;
      border: 1px solid #d1d5db;
      font-size: 15px;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    button {
      background: #2563eb;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #1d4ed8;
    }

    .secondary-btn {
      background: #6b7280;
    }

    .secondary-btn:hover {
      background: #4b5563;
    }

    .msg {
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 15px;
      white-space: pre-wrap;
    }

    .error {
      background: #fef2f2;
      color: #b91c1c;
      border: 1px solid #fecaca;
    }

    .info {
      background: #eff6ff;
      color: #1d4ed8;
      border: 1px solid #bfdbfe;
    }

    .success {
      background: #ecfdf5;
      color: #047857;
      border: 1px solid #a7f3d0;
    }

    .warning {
      background: #fff7ed;
      color: #c2410c;
      border: 1px solid #fdba74;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .small-btn {
      width: auto;
      min-width: 160px;
      margin-bottom: 0;
    }

    .button-link {
      text-decoration: none;
    }

    .vehicle-card {
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 20px;
      background: #fafafa;
    }

    .vehicle-title {
      margin: 0 0 18px;
      font-size: 30px;
      color: #111827;
    }

    .vehicle-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .field {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 12px;
    }

    .field-label {
      font-size: 12px;
      color: #6b7280;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .field-value {
      font-size: 15px;
      font-weight: 600;
      word-break: break-word;
    }

    .notes,
    .ficha-box,
    .edit-box {
      margin-top: 14px;
      padding: 14px;
      border-radius: 12px;
      background: white;
      border: 1px solid #e5e7eb;
      white-space: pre-wrap;
    }

    .badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: bold;
      background: #e5e7eb;
      color: #374151;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      min-width: 850px;
    }

    th, td {
      border-bottom: 1px solid #e5e7eb;
      padding: 10px;
      text-align: left;
      vertical-align: top;
    }

    th {
      background: #f9fafb;
    }

    tr.clickable-row:hover {
      background: #eff6ff;
      cursor: pointer;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .form-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    @media (max-width: 700px) {
      .vehicle-grid,
      .form-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <div id="loginView" class="box">
    <div class="header">
      <h2>Acceso Automoción</h2>
      <p>Consulta interna de vehículos del taller</p>
    </div>
    <div class="content">
      <input id="username" type="text" placeholder="Usuario" />
      <input id="password" type="password" placeholder="Contraseña" />
      <button onclick="login()">Entrar</button>
      <div id="loginError" class="msg error hidden"></div>
      <div id="entryInfo" class="msg info hidden"></div>
    </div>
  </div>

  <div id="appView" class="box hidden">
    <div class="header">
      <h2>Gestión de vehículos</h2>
      <p id="welcomeText"></p>
    </div>

    <div class="content">
      <div class="topbar">
        <div id="viewModeText">Consulta de vehículo</div>
        <div style="display:flex; gap:10px; flex-wrap:wrap;">
          <button id="showAllBtn" class="small-btn hidden" onclick="showAllVehicles()">Ver todos</button>
          <button class="small-btn secondary-btn" onclick="logout()">Cerrar sesión</button>
        </div>
      </div>

      <div id="appMessage" class="msg info hidden"></div>

      <div id="vehicleDetail"></div>

      <div id="tableContainer" class="table-wrap hidden">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Vehículo</th>
              <th>Color</th>
              <th>VIN</th>
              <th>Estado</th>
              <th>Observaciones</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const USERS = [
      { username: "profesor", password: "auto2026", role: "profesor", name: "Profesorado" },
      { username: "alumno1", password: "auto2026", role: "alumno", name: "Alumno 1" },
      { username: "alumno2", password: "auto2026", role: "alumno", name: "Alumno 2" }
    ];

    const SHEET_ID = "1sf2TS8gCKachrkz66S6E_zQuafVpu7F_AhSLdhi-W-g";
    const SHEET_GID = "0";
    const SAVE_API_URL = "https://script.google.com/macros/s/AKfycbwggUaHxijt27ZeKOMIi2BqsTXzt9KfrLKtmmW7iGWB4KNO4ss5vzx7xiZ-FWjg3ohbhQ/exec";

    let vehicles = [];
    let currentUser = null;

    function getEntryParams() {
      const params = new URLSearchParams(window.location.search);
      return {
        id: params.get("id"),
        trabajo: params.get("trabajo")
      };
    }

    function login() {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();
      const loginError = document.getElementById("loginError");
      const entryInfo = document.getElementById("entryInfo");

      loginError.classList.add("hidden");
      loginError.textContent = "";
      entryInfo.classList.add("hidden");
      entryInfo.textContent = "";

      const user = USERS.find(u => u.username === username && u.password === password);

      if (!user) {
        loginError.textContent = "Usuario o contraseña incorrectos.";
        loginError.classList.remove("hidden");
        return;
      }

      const entry = getEntryParams();

      if (user.role === "alumno" && !entry.id && !entry.trabajo) {
        loginError.textContent = "Acceso solo permitido mediante QR del coche o ficha de trabajo.";
        loginError.classList.remove("hidden");
        return;
      }

      currentUser = user;
      sessionStorage.setItem("automocion_user", JSON.stringify(user));

      document.getElementById("loginView").classList.add("hidden");
      document.getElementById("appView").classList.remove("hidden");
      document.getElementById("welcomeText").textContent = `Bienvenido, ${user.name} · Rol: ${user.role}`;

      loadVehiclesJSONP();
    }

    function logout() {
      sessionStorage.removeItem("automocion_user");
      currentUser = null;
      vehicles = [];

      document.getElementById("appView").classList.add("hidden");
      document.getElementById("loginView").classList.remove("hidden");

      document.getElementById("username").value = "";
      document.getElementById("password").value = "";
      document.getElementById("vehicleDetail").innerHTML = "";
      document.getElementById("tableBody").innerHTML = "";
      document.getElementById("tableContainer").classList.add("hidden");
      document.getElementById("showAllBtn").classList.add("hidden");
      document.getElementById("appMessage").classList.add("hidden");
      document.getElementById("appMessage").textContent = "";
    }

    function showAllVehicles() {
      if (!currentUser || currentUser.role !== "profesor") return;

      document.getElementById("viewModeText").textContent = "Listado completo de vehículos";
      document.getElementById("vehicleDetail").innerHTML = "";
      document.getElementById("tableContainer").classList.remove("hidden");
      document.getElementById("showAllBtn").classList.add("hidden");
      renderVehiclesTable();
    }

    function loadVehiclesJSONP() {
      const appMessage = document.getElementById("appMessage");
      appMessage.classList.add("hidden");
      appMessage.textContent = "";

      const old = document.getElementById("sheetJsonpScript");
      if (old) old.remove();

      window.handleSheetData = function(response) {
        try {
          const cols = response.table.cols.map((col, index) => {
            const label = (col.label || "").trim();
            return label || `Columna ${index + 1}`;
          });

          const rows = response.table.rows.map(row => {
            const obj = {};
            cols.forEach((colName, index) => {
              obj[colName] = row.c[index] && row.c[index].v != null ? row.c[index].v : "";
            });
            return obj;
          });

          vehicles = rows.map(r => ({
            id: value(r["ID"]),
            qr: value(r["QR"]),
            tailerra: value(r["TAILERRA"]),
            autoa: value(r["Autoa"]),
            color: value(r["Kolorea"]),
            vin: value(r["VIN"]),
            fitxaTeknika: value(r["Fitxa teknika"]),
            revistaTeknika: value(r["Revista teknika"]),
            egokitua: value(r["Egokitua"]),
            erabilpena: value(r["Erabilpena"]),
            estado: value(r["Egoera"]),
            piztenDu: normalizeYesNo(value(r["Pizten du"])),
            piztuBeharDu: normalizeYesNo(value(r["Piztu behar du"])),
            observaciones: value(r["Oharrak"])
          })).filter(v => v.id !== "");

          if (!vehicles.length) {
            appMessage.textContent = "No se han encontrado vehículos válidos.";
            appMessage.className = "msg error";
            appMessage.classList.remove("hidden");
            return;
          }

          routeAfterLoad();
        } catch (error) {
          appMessage.textContent = "Error procesando la hoja:\n" + error.message;
          appMessage.className = "msg error";
          appMessage.classList.remove("hidden");
        }
      };

      const script = document.createElement("script");
      script.id = "sheetJsonpScript";
      script.src = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?gid=${SHEET_GID}&tqx=responseHandler:handleSheetData`;
      script.onerror = function() {
        appMessage.textContent = "No se ha podido cargar la hoja desde Google Sheets.";
        appMessage.className = "msg error";
        appMessage.classList.remove("hidden");
      };

      document.body.appendChild(script);
    }

    function routeAfterLoad() {
      const entry = getEntryParams();
      const appMessage = document.getElementById("appMessage");

      if (!currentUser) return;

      if (currentUser.role === "profesor") {
        if (entry.id) {
          const vehicle = vehicles.find(v => String(v.id) === String(entry.id));
          if (!vehicle) {
            appMessage.textContent = "No se ha encontrado ningún vehículo con ese ID.";
            appMessage.className = "msg error";
            appMessage.classList.remove("hidden");
            return;
          }
          renderVehicleDetail(vehicle);
          return;
        }

        if (entry.trabajo) {
          appMessage.textContent = "La ficha de trabajo todavía no está implementada.";
          appMessage.className = "msg warning";
          appMessage.classList.remove("hidden");
          return;
        }

        document.getElementById("viewModeText").textContent = "Panel general de profesor";
        document.getElementById("tableContainer").classList.remove("hidden");
        renderVehiclesTable();
        return;
      }

      if (currentUser.role === "alumno") {
        if (entry.id) {
          const vehicle = vehicles.find(v => String(v.id) === String(entry.id));
          if (!vehicle) {
            appMessage.textContent = "No se ha encontrado ningún vehículo con ese ID.";
            appMessage.className = "msg error";
            appMessage.classList.remove("hidden");
            return;
          }
          renderVehicleDetail(vehicle);
          return;
        }

        if (entry.trabajo) {
          appMessage.textContent = "La ficha de trabajo todavía no está implementada.";
          appMessage.className = "msg warning";
          appMessage.classList.remove("hidden");
          return;
        }

        appMessage.textContent = "Acceso denegado. El alumnado solo puede entrar desde QR o ficha de trabajo.";
        appMessage.className = "msg error";
        appMessage.classList.remove("hidden");
      }
    }

    function renderVehiclesTable() {
      const tableBody = document.getElementById("tableBody");

      tableBody.innerHTML = vehicles.map(v => `
        <tr class="clickable-row" onclick="openVehicleAsProfessor('${escapeJs(v.id)}')">
          <td>${escapeHtml(v.id)}</td>
          <td>${escapeHtml(v.autoa)}</td>
          <td>${escapeHtml(v.color)}</td>
          <td>${escapeHtml(v.vin)}</td>
          <td>${escapeHtml(v.estado)}</td>
          <td>${escapeHtml(v.observaciones)}</td>
        </tr>
      `).join("");
    }

    function openVehicleAsProfessor(vehicleId) {
      if (!currentUser || currentUser.role !== "profesor") return;

      const vehicle = vehicles.find(v => String(v.id) === String(vehicleId));
      if (!vehicle) return;

      renderVehicleDetail(vehicle);
    }

    function renderVehicleDetail(vehicle) {
      const detail = document.getElementById("vehicleDetail");
      const tableContainer = document.getElementById("tableContainer");
      const viewModeText = document.getElementById("viewModeText");
      const showAllBtn = document.getElementById("showAllBtn");

      viewModeText.textContent = currentUser && currentUser.role === "profesor"
        ? "Ficha de vehículo"
        : "Ficha asignada por QR";

      tableContainer.classList.add("hidden");

      if (currentUser && currentUser.role === "profesor") {
        showAllBtn.classList.remove("hidden");
      } else {
        showAllBtn.classList.add("hidden");
      }

      detail.innerHTML = `
        <div class="vehicle-card">
          <h2 class="vehicle-title">${escapeHtml(vehicle.autoa || "Vehículo")}</h2>

          <div class="vehicle-grid">
            <div class="field">
              <div class="field-label">ID</div>
              <div class="field-value">${escapeHtml(vehicle.id)}</div>
            </div>

            <div class="field">
              <div class="field-label">Taller</div>
              <div class="field-value">${escapeHtml(vehicle.tailerra)}</div>
            </div>

            <div class="field">
              <div class="field-label">Color</div>
              <div class="field-value">${escapeHtml(vehicle.color)}</div>
            </div>

            <div class="field">
              <div class="field-label">VIN</div>
              <div class="field-value">${escapeHtml(vehicle.vin)}</div>
            </div>

            <div class="field">
              <div class="field-label">Egokitua</div>
              <div class="field-value">${escapeHtml(vehicle.egokitua)}</div>
            </div>

            <div class="field">
              <div class="field-label">Erabilpena</div>
              <div class="field-value">${escapeHtml(vehicle.erabilpena)}</div>
            </div>
          </div>

          <div class="edit-box">
            <div class="form-grid">
              <div>
                <label for="estadoInput"><strong>Estado / Egoera</strong></label>
                <textarea id="estadoInput">${escapeHtml(vehicle.estado)}</textarea>
              </div>

              <div>
                <label for="observacionesInput"><strong>Observaciones / Oharrak</strong></label>
                <textarea id="observacionesInput">${escapeHtml(vehicle.observaciones || "")}</textarea>
              </div>

              <div>
                <label for="piztenDuInput"><strong>Pizten du</strong></label>
                <select id="piztenDuInput">
                  <option value="Bai" ${vehicle.piztenDu === "Bai" ? "selected" : ""}>Bai</option>
                  <option value="Ez" ${vehicle.piztenDu === "Ez" ? "selected" : ""}>Ez</option>
                </select>
              </div>

              <div>
                <label for="piztuBeharDuInput"><strong>Piztu behar du</strong></label>
                <select id="piztuBeharDuInput">
                  <option value="Bai" ${vehicle.piztuBeharDu === "Bai" ? "selected" : ""}>Bai</option>
                  <option value="Ez" ${vehicle.piztuBeharDu === "Ez" ? "selected" : ""}>Ez</option>
                </select>
              </div>
            </div>

            <div class="form-actions">
              <button type="button" class="small-btn" onclick="saveVehicleChanges('${escapeJs(vehicle.id)}')">Guardar cambios</button>
              <button type="button" class="small-btn secondary-btn" onclick="resetVehicleForm('${escapeJs(vehicle.id)}')">Restablecer</button>
            </div>
          </div>

          ${renderFichaTecnica(vehicle.fitxaTeknika)}
          ${renderRevistaTecnica(vehicle.revistaTeknika)}
        </div>
      `;
    }

    async function saveVehicleChanges(vehicleId) {
      const vehicle = vehicles.find(v => String(v.id) === String(vehicleId));
      if (!vehicle || !currentUser) return;

      const estadoInput = document.getElementById("estadoInput");
      const observacionesInput = document.getElementById("observacionesInput");
      const piztenDuInput = document.getElementById("piztenDuInput");
      const piztuBeharDuInput = document.getElementById("piztuBeharDuInput");
      const appMessage = document.getElementById("appMessage");

      const payload = {
        usuario: currentUser.username,
        idVehiculo: vehicle.id,
        estado: estadoInput.value.trim(),
        observaciones: observacionesInput.value.trim(),
        piztenDu: piztenDuInput.value,
        piztuBeharDu: piztuBeharDuInput.value
      };

      const url =
        SAVE_API_URL +
        "?usuario=" + encodeURIComponent(payload.usuario) +
        "&idVehiculo=" + encodeURIComponent(payload.idVehiculo) +
        "&estado=" + encodeURIComponent(payload.estado) +
        "&observaciones=" + encodeURIComponent(payload.observaciones) +
        "&piztenDu=" + encodeURIComponent(payload.piztenDu) +
        "&piztuBeharDu=" + encodeURIComponent(payload.piztuBeharDu);

      appMessage.textContent = "Guardando cambios...";
      appMessage.className = "msg info";
      appMessage.classList.remove("hidden");

      try {
        const response = await fetch(url);
        const result = await response.json();

        if (!result.ok) {
          throw new Error(result.message || "No se pudieron guardar los cambios");
        }

        vehicle.estado = payload.estado;
        vehicle.observaciones = payload.observaciones;
        vehicle.piztenDu = payload.piztenDu;
        vehicle.piztuBeharDu = payload.piztuBeharDu;

        appMessage.textContent = "Cambios guardados correctamente.";
        appMessage.className = "msg success";
        appMessage.classList.remove("hidden");

        renderVehicleDetail(vehicle);
      } catch (error) {
        appMessage.textContent = "Error al guardar:\n" + error.message;
        appMessage.className = "msg error";
        appMessage.classList.remove("hidden");
      }
    }

    function resetVehicleForm(vehicleId) {
      const vehicle = vehicles.find(v => String(v.id) === String(vehicleId));
      if (!vehicle) return;
      renderVehicleDetail(vehicle);
    }

    function renderFichaTecnica(fitxaTeknika) {
      if (!fitxaTeknika) {
        return `
          <div class="ficha-box">
            <strong>Ficha técnica</strong><br>
            No disponible.
          </div>
        `;
      }

      return `
        <div class="ficha-box">
          <strong>Ficha técnica</strong><br><br>
          <a class="button-link" href="${escapeAttr(fitxaTeknika)}" target="_blank" rel="noopener">
            <button type="button" class="small-btn">Ver ficha técnica</button>
          </a>
        </div>
      `;
    }

    function renderRevistaTecnica(revistaTeknika) {
      if (!revistaTeknika) {
        return "";
      }

      return `
        <div class="ficha-box">
          <strong>Revista técnica</strong><br><br>
          <a class="button-link" href="${escapeAttr(revistaTeknika)}" target="_blank" rel="noopener">
            <button type="button" class="small-btn">Ver revista técnica</button>
          </a>
        </div>
      `;
    }

    function normalizeYesNo(value) {
      const v = String(value || "").trim().toLowerCase();
      if (v === "bai" || v === "si" || v === "sí" || v === "yes") return "Bai";
      if (v === "ez" || v === "no") return "Ez";
      return "Ez";
    }

    function value(v) {
      if (v === undefined || v === null) return "";
      return String(v).trim();
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function escapeAttr(value) {
      return escapeHtml(value);
    }

    function escapeJs(value) {
      return String(value ?? "")
        .replace(/\\/g, "\\\\")
        .replace(/'/g, "\\'")
        .replace(/"/g, '\\"');
    }
  </script>
</body>
</html>
