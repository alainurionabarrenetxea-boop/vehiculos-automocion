<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Automoción - Gestión de vehículos</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f7fb;
      color: #1f2937;
    }

    .hidden {
      display: none !important;
    }

    .box {
      max-width: 1100px;
      margin: 24px auto;
      background: white;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      overflow: hidden;
    }

    .header {
      background: #2563eb;
      color: white;
      padding: 20px;
    }

    .header h2 {
      margin: 0 0 6px;
    }

    .header p {
      margin: 0;
      opacity: 0.95;
    }

    .content {
      padding: 20px;
    }

    input, button, textarea, select {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 10px;
      border: 1px solid #d1d5db;
      font-size: 15px;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    textarea {
      min-height: 100px;
      resize: vertical;
    }

    button {
      background: #2563eb;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #1d4ed8;
    }

    .secondary-btn {
      background: #6b7280;
    }

    .secondary-btn:hover {
      background: #4b5563;
    }

    .msg {
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 15px;
      white-space: pre-wrap;
    }

    .error {
      background: #fef2f2;
      color: #b91c1c;
      border: 1px solid #fecaca;
    }

    .info {
      background: #eff6ff;
      color: #1d4ed8;
      border: 1px solid #bfdbfe;
    }

    .success {
      background: #ecfdf5;
      color: #047857;
      border: 1px solid #a7f3d0;
    }

    .danger-banner {
      background: #b91c1c;
      color: white;
      padding: 14px;
      border-radius: 12px;
      margin-bottom: 14px;
      font-weight: bold;
      white-space: pre-wrap;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .small-btn {
      width: auto;
      min-width: 160px;
      margin-bottom: 0;
    }

    .button-link {
      text-decoration: none;
    }

    .vehicle-card {
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 20px;
      background: #fafafa;
    }

    .vehicle-title {
      margin: 0 0 18px;
      font-size: 30px;
      color: #111827;
    }

    .vehicle-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .field {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 12px;
    }

    .field-label {
      font-size: 12px;
      color: #6b7280;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .field-value {
      font-size: 15px;
      font-weight: 600;
      word-break: break-word;
    }

    .ficha-box,
    .edit-box {
      margin-top: 14px;
      padding: 14px;
      border-radius: 12px;
      background: white;
      border: 1px solid #e5e7eb;
      white-space: pre-wrap;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      min-width: 850px;
    }

    th, td {
      border-bottom: 1px solid #e5e7eb;
      padding: 10px;
      text-align: left;
      vertical-align: top;
    }

    th {
      background: #f9fafb;
    }

    tr.clickable-row:hover {
      background: #eff6ff;
      cursor: pointer;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .save-status {
      display: inline-block;
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 12px;
      background: #eff6ff;
      color: #1d4ed8;
    }

    @media (max-width: 700px) {
      .vehicle-grid,
      .form-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <div id="loginView" class="box">
    <div class="header">
      <h2>Acceso Automoción</h2>
      <p>Consulta interna de vehículos del taller</p>
    </div>
    <div class="content">
      <input id="username" type="text" placeholder="Usuario">
      <input id="password" type="password" placeholder="Contraseña">
      <button type="button" onclick="login()">Entrar</button>
      <div id="loginError" class="msg error hidden"></div>
    </div>
  </div>

  <div id="appView" class="box hidden">
    <div class="header">
      <h2>Gestión de vehículos</h2>
      <p id="welcomeText"></p>
    </div>

    <div class="content">
      <div class="topbar">
        <div id="viewModeText">Consulta de vehículo</div>
        <div style="display:flex; gap:10px; flex-wrap:wrap;">
          <button id="showAllBtn" class="small-btn hidden" type="button" onclick="showAllVehicles()">Ver todos</button>
          <button class="small-btn secondary-btn" type="button" onclick="logout()">Cerrar sesión</button>
        </div>
      </div>

      <div id="appMessage" class="msg info hidden"></div>
      <div id="vehicleDetail"></div>

      <div id="tableContainer" class="table-wrap hidden">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Vehículo</th>
              <th>Color</th>
              <th>VIN</th>
              <th>Estado</th>
              <th>Observaciones</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const USERS = [
      { username: "profesor", password: "auto2026", role: "profesor", name: "Profesorado" },
      { username: "alumno1", password: "auto2026", role: "alumno", name: "Alumno 1" },
      { username: "alumno2", password: "auto2026", role: "alumno", name: "Alumno 2" }
    ];

    const SHEET_ID = "1sf2TS8gCKachrkz66S6E_zQuafVpu7F_AhSLdhi-W-g";
    const SHEET_GID = "0";
    const SAVE_API_URL = "https://script.google.com/macros/s/AKfycbzAytsESft7wmlAIb2PmtEYBTNyi-zs7ZLbnXtwptHoJd8he9QT8NAuMw7Ro20mMS_5Bg/exec";

    let vehicles = [];
    let currentUser = null;

    function showLoginError(text) {
      const el = document.getElementById("loginError");
      el.textContent = text;
      el.classList.remove("hidden");
    }

    function clearLoginError() {
      const el = document.getElementById("loginError");
      el.textContent = "";
      el.classList.add("hidden");
    }

    function showMessage(text, type = "info") {
      const el = document.getElementById("appMessage");
      el.textContent = text;
      el.className = "msg " + type;
      el.classList.remove("hidden");
    }

    function clearMessage() {
      const el = document.getElementById("appMessage");
      el.textContent = "";
      el.classList.add("hidden");
    }

    function value(v) {
      return v == null ? "" : String(v).trim();
    }

    function normalizeYesNo(v) {
      const x = String(v || "").trim().toLowerCase();
      if (x === "bai" || x === "si" || x === "sí" || x === "yes") return "Bai";
      if (x === "ez" || x === "no") return "Ez";
      return "Ez";
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function escapeAttr(value) {
      return escapeHtml(value);
    }

    function escapeJs(value) {
      return String(value ?? "")
        .replace(/\\/g, "\\\\")
        .replace(/'/g, "\\'")
        .replace(/"/g, '\\"');
    }

    function getEntryParams() {
      const params = new URLSearchParams(window.location.search);
      return {
        id: params.get("id"),
        trabajo: params.get("trabajo"),
        profesor: params.get("profesor")
      };
    }

    function login() {
      clearLoginError();

      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();

      const user = USERS.find(u => u.username === username && u.password === password);
      if (!user) {
        showLoginError("Usuario o contraseña incorrectos.");
        return;
      }

      const entry = getEntryParams();

      if (user.role === "alumno" && !entry.id && !entry.trabajo) {
        showLoginError("Acceso solo permitido mediante QR del coche o ficha de trabajo.");
        return;
      }

      currentUser = user;
      document.getElementById("loginView").classList.add("hidden");
      document.getElementById("appView").classList.remove("hidden");
      document.getElementById("welcomeText").textContent = `Bienvenido, ${user.name} · Rol: ${user.role}`;

      loadVehiclesJSONP();
    }

    function logout() {
      currentUser = null;
      vehicles = [];
      document.getElementById("appView").classList.add("hidden");
      document.getElementById("loginView").classList.remove("hidden");
      document.getElementById("username").value = "";
      document.getElementById("password").value = "";
      document.getElementById("vehicleDetail").innerHTML = "";
      document.getElementById("tableBody").innerHTML = "";
      document.getElementById("tableContainer").classList.add("hidden");
      document.getElementById("showAllBtn").classList.add("hidden");
      clearMessage();
      clearLoginError();
    }

    function loadVehiclesJSONP() {
      clearMessage();

      const old = document.getElementById("sheetJsonpScript");
      if (old) old.remove();

      window.handleSheetData = function(response) {
        try {
          const cols = response.table.cols.map((col, index) => {
            const label = (col.label || "").trim();
            return label || `Columna ${index + 1}`;
          });

          const rows = response.table.rows.map(row => {
            const obj = {};
            cols.forEach((colName, index) => {
              obj[colName] = row.c[index] && row.c[index].v != null ? row.c[index].v : "";
            });
            return obj;
          });

          vehicles = rows.map(r => ({
            id: value(r["ID"]),
            qr: value(r["QR"]),
            tailerra: value(r["TAILERRA"]),
            autoa: value(r["Autoa"]),
            color: value(r["Kolorea"]),
            vin: value(r["VIN"]),
            fitxaTeknika: value(r["Fitxa teknika"]),
            rta: value(r["RTA"]),
            egokitua: value(r["Egokitua"]),
            erabilpena: value(r["Erabilpena"]),
            estado: value(r["Egoera"]),
            piztenDu: normalizeYesNo(value(r["Pizten du"])),
            piztuBeharDu: normalizeYesNo(value(r["Piztu behar du"])),
            observaciones: value(r["Oharrak"]),
            blokatuta: normalizeYesNo(value(r["BLOKATUTA"])),
            idBlokeoa: value(r["ID BLOKEOA"]),
            blokeoData: value(r["BLOKEO DATA"]),
            blokeoZergatia: value(r["BLOKEO ZERGATIA"])
          })).filter(v => v.id !== "");

          routeAfterLoad();
        } catch (error) {
          showMessage("Error procesando la hoja:\n" + error.message, "error");
        }
      };

      const script = document.createElement("script");
      script.id = "sheetJsonpScript";
      script.src = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?gid=${SHEET_GID}&tqx=responseHandler:handleSheetData`;
      script.onerror = function() {
        showMessage("No se ha podido cargar la hoja desde Google Sheets.", "error");
      };

      document.body.appendChild(script);
    }

    function routeAfterLoad() {
      const entry = getEntryParams();
      if (!currentUser) return;

      if (currentUser.role === "profesor") {
        if (entry.id) {
          const vehicle = vehicles.find(v => String(v.id) === String(entry.id));
          if (!vehicle) {
            showMessage("No se ha encontrado ningún vehículo con ese ID.", "error");
            return;
          }
          renderVehicleDetail(vehicle);
          return;
        }

        document.getElementById("viewModeText").textContent = "Panel general de profesor";
        document.getElementById("tableContainer").classList.remove("hidden");
        renderVehiclesTable();
        return;
      }

      if (currentUser.role === "alumno") {
        if (entry.id) {
          const vehicle = vehicles.find(v => String(v.id) === String(entry.id));
          if (!vehicle) {
            showMessage("No se ha encontrado ningún vehículo con ese ID.", "error");
            return;
          }
          renderVehicleDetail(vehicle);
          return;
        }

        showMessage("Acceso denegado. El alumnado solo puede entrar desde QR o ficha de trabajo.", "error");
      }
    }

    function showAllVehicles() {
      if (!currentUser || currentUser.role !== "profesor") return;

      document.getElementById("viewModeText").textContent = "Listado completo de vehículos";
      document.getElementById("vehicleDetail").innerHTML = "";
      document.getElementById("tableContainer").classList.remove("hidden");
      document.getElementById("showAllBtn").classList.add("hidden");
      renderVehiclesTable();
    }

    function renderVehiclesTable() {
      const tableBody = document.getElementById("tableBody");
      tableBody.innerHTML = vehicles.map(v => `
        <tr class="clickable-row" onclick="openVehicleAsProfessor('${escapeJs(v.id)}')">
          <td>${escapeHtml(v.id)}</td>
          <td>${escapeHtml(v.autoa)}</td>
          <td>${escapeHtml(v.color)}</td>
          <td>${escapeHtml(v.vin)}</td>
          <td>${escapeHtml(v.estado)}</td>
          <td>${escapeHtml(v.observaciones)}</td>
        </tr>
      `).join("");
    }

    function openVehicleAsProfessor(vehicleId) {
      if (!currentUser || currentUser.role !== "profesor") return;
      const vehicle = vehicles.find(v => String(v.id) === String(vehicleId));
      if (!vehicle) return;
      renderVehicleDetail(vehicle);
    }

    function renderVehicleDetail(vehicle) {
      const detail = document.getElementById("vehicleDetail");
      const tableContainer = document.getElementById("tableContainer");
      const viewModeText = document.getElementById("viewModeText");
      const showAllBtn = document.getElementById("showAllBtn");

      const isProfesor = currentUser && currentUser.role === "profesor";
      const isBlockedForStudent = !isProfesor && vehicle.blokatuta === "Bai";

      viewModeText.textContent = isProfesor ? "Ficha de vehículo" : "Ficha asignada por QR";
      tableContainer.classList.add("hidden");

      if (isProfesor) showAllBtn.classList.remove("hidden");
      else showAllBtn.classList.add("hidden");

      detail.innerHTML = `
        ${vehicle.blokatuta === "Bai" ? `
          <div class="danger-banner">🚫 VEHÍCULO BLOQUEADO
${vehicle.idBlokeoa ? "Bloqueado por: " + escapeHtml(vehicle.idBlokeoa) : ""}
${vehicle.blokeoData ? "\nFecha: " + escapeHtml(vehicle.blokeoData) : ""}
${vehicle.blokeoZergatia ? "\nMotivo: " + escapeHtml(vehicle.blokeoZergatia) : ""}</div>
        ` : ""}

        <div class="vehicle-card">
          <h2 class="vehicle-title">${escapeHtml(vehicle.autoa || "Vehículo")}</h2>

          <div class="vehicle-grid">
            <div class="field"><div class="field-label">ID</div><div class="field-value">${escapeHtml(vehicle.id)}</div></div>
            <div class="field"><div class="field-label">Taller</div><div class="field-value">${escapeHtml(vehicle.tailerra)}</div></div>
            <div class="field"><div class="field-label">Color</div><div class="field-value">${escapeHtml(vehicle.color)}</div></div>
            <div class="field"><div class="field-label">VIN</div><div class="field-value">${escapeHtml(vehicle.vin)}</div></div>
            <div class="field"><div class="field-label">Egokitua</div><div class="field-value">${escapeHtml(vehicle.egokitua)}</div></div>
            <div class="field"><div class="field-label">Erabilpena</div><div class="field-value">${escapeHtml(vehicle.erabilpena)}</div></div>
          </div>

          <div class="edit-box">
            <div id="saveStatus" class="save-status">Lista para guardar.</div>

            <div class="form-grid">
              <div>
                <label for="estadoInput"><strong>Estado / Egoera</strong></label>
                <textarea id="estadoInput" ${isBlockedForStudent ? "disabled" : ""}>${escapeHtml(vehicle.estado)}</textarea>
              </div>

              <div>
                <label for="observacionesInput"><strong>Observaciones / Oharrak</strong></label>
                <textarea id="observacionesInput" ${isBlockedForStudent ? "disabled" : ""}>${escapeHtml(vehicle.observaciones || "")}</textarea>
              </div>

              <div>
                <label for="piztenDuInput"><strong>Pizten du</strong></label>
                <select id="piztenDuInput" ${isBlockedForStudent ? "disabled" : ""}>
                  <option value="Bai" ${vehicle.piztenDu === "Bai" ? "selected" : ""}>Bai</option>
                  <option value="Ez" ${vehicle.piztenDu === "Ez" ? "selected" : ""}>Ez</option>
                </select>
              </div>

              <div>
                <label for="piztuBeharDuInput"><strong>Piztu behar du</strong></label>
                <select id="piztuBeharDuInput" ${isBlockedForStudent ? "disabled" : ""}>
                  <option value="Bai" ${vehicle.piztuBeharDu === "Bai" ? "selected" : ""}>Bai</option>
                  <option value="Ez" ${vehicle.piztuBeharDu === "Ez" ? "selected" : ""}>Ez</option>
                </select>
              </div>

              ${isProfesor ? `
              <div>
                <label for="blokatutaInput"><strong>BLOKATUTA</strong></label>
                <select id="blokatutaInput">
                  <option value="Bai" ${vehicle.blokatuta === "Bai" ? "selected" : ""}>Bai</option>
                  <option value="Ez" ${vehicle.blokatuta === "Ez" ? "selected" : ""}>Ez</option>
                </select>
              </div>

              <div>
                <label for="blokeoZergatiaInput"><strong>BLOKEO ZERGATIA</strong></label>
                <textarea id="blokeoZergatiaInput">${escapeHtml(vehicle.blokeoZergatia || "")}</textarea>
              </div>
              ` : ""}
            </div>

            ${!isBlockedForStudent ? `
            <button type="button" onclick="saveVehicleChanges('${escapeJs(vehicle.id)}')">Guardar cambios</button>
            ` : ""}
          </div>

          ${renderFichaTecnica(vehicle.fitxaTeknika)}
          ${renderRTA(vehicle.rta)}
        </div>
      `;
    }

    function setSaveStatus(text, isError = false) {
      const el = document.getElementById("saveStatus");
      if (!el) return;
      el.textContent = text;
      el.style.background = isError ? "#fef2f2" : "#eff6ff";
      el.style.color = isError ? "#b91c1c" : "#1d4ed8";
    }

    function saveVehicleChanges(vehicleId) {
      const vehicle = vehicles.find(v => String(v.id) === String(vehicleId));
      if (!vehicle || !currentUser) return;

      const estadoInput = document.getElementById("estadoInput");
      const observacionesInput = document.getElementById("observacionesInput");
      const piztenDuInput = document.getElementById("piztenDuInput");
      const piztuBeharDuInput = document.getElementById("piztuBeharDuInput");

      if (!estadoInput || !observacionesInput || !piztenDuInput || !piztuBeharDuInput) {
        showMessage("No se han encontrado los campos del formulario.", "error");
        return;
      }

      const payload = {
        usuario: currentUser.username,
        rol: currentUser.role,
        idVehiculo: vehicle.id,
        autoa: vehicle.autoa,
        estado: estadoInput.value.trim(),
        observaciones: observacionesInput.value.trim(),
        piztenDu: piztenDuInput.value,
        piztuBeharDu: piztuBeharDuInput.value,
        blokeado: currentUser.role === "profesor" && document.getElementById("blokatutaInput")
          ? document.getElementById("blokatutaInput").value
          : vehicle.blokatuta,
        motivo: currentUser.role === "profesor" && document.getElementById("blokeoZergatiaInput")
          ? document.getElementById("blokeoZergatiaInput").value.trim()
          : vehicle.blokeoZergatia
      };

      const callbackName = "handleSaveResponse_" + Date.now();

      window[callbackName] = function(result) {
        try {
          if (!result || !result.ok) {
            const msg = result && result.msg ? result.msg : "No se pudieron guardar los cambios";
            showMessage("Error al guardar:\n" + msg, "error");
            setSaveStatus("Error al guardar.", true);
            return;
          }

          vehicle.estado = payload.estado;
          vehicle.observaciones = payload.observaciones;
          vehicle.piztenDu = payload.piztenDu;
          vehicle.piztuBeharDu = payload.piztuBeharDu;
          vehicle.blokatuta = payload.blokeado;
          vehicle.blokeoZergatia = payload.motivo;

          if (currentUser.role === "profesor") {
            if (payload.blokeado === "Bai") {
              vehicle.idBlokeoa = currentUser.username;
              vehicle.blokeoData = new Date().toLocaleString("es-ES");
            } else {
              vehicle.idBlokeoa = "";
              vehicle.blokeoData = "";
              vehicle.blokeoZergatia = "";
            }
          }

          showMessage("Cambios guardados correctamente.", "success");
          setSaveStatus("Cambios guardados correctamente.");
          renderVehicleDetail(vehicle);
        } finally {
          const script = document.getElementById(callbackName);
          if (script) script.remove();
          delete window[callbackName];
        }
      };

      const url =
        SAVE_API_URL +
        "?callback=" + encodeURIComponent(callbackName) +
        "&idVehiculo=" + encodeURIComponent(payload.idVehiculo) +
        "&usuario=" + encodeURIComponent(payload.usuario) +
        "&rol=" + encodeURIComponent(payload.rol) +
        "&autoa=" + encodeURIComponent(payload.autoa) +
        "&estado=" + encodeURIComponent(payload.estado) +
        "&observaciones=" + encodeURIComponent(payload.observaciones) +
        "&piztenDu=" + encodeURIComponent(payload.piztenDu) +
        "&piztuBeharDu=" + encodeURIComponent(payload.piztuBeharDu) +
        "&blokeado=" + encodeURIComponent(payload.blokeado) +
        "&motivo=" + encodeURIComponent(payload.motivo);

      setSaveStatus("Guardando...");

      const script = document.createElement("script");
      script.id = callbackName;
      script.src = url;
      script.onerror = function() {
        showMessage("Error al conectar con el servicio de guardado.", "error");
        setSaveStatus("Error al conectar con el servicio de guardado.", true);
        script.remove();
        delete window[callbackName];
      };

      document.body.appendChild(script);
    }

    function renderFichaTecnica(link) {
      if (!link) return "";
      return `
        <div class="ficha-box">
          <strong>Ficha técnica</strong><br><br>
          <a class="button-link" href="${escapeAttr(link)}" target="_blank" rel="noopener">
            <button type="button" class="small-btn">Ver ficha técnica</button>
          </a>
        </div>
      `;
    }

    function renderRTA(link) {
      if (!link) return "";
      return `
        <div class="ficha-box">
          <strong>RTA</strong><br><br>
          <a class="button-link" href="${escapeAttr(link)}" target="_blank" rel="noopener">
            <button type="button" class="small-btn">Ver RTA</button>
          </a>
        </div>
      `;
    }

    document.getElementById("password").addEventListener("keydown", function(e) {
      if (e.key === "Enter") login();
    });
  </script>
</body>
</html>
