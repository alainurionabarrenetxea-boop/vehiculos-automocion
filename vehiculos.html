<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Automoción - Ficha de vehículo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f7fb;
      color: #1f2937;
    }

    .hidden { display: none !important; }

    .box {
      max-width: 1050px;
      margin: 24px auto;
      background: white;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    .header {
      background: #2563eb;
      color: white;
      padding: 20px;
    }

    .header h2 {
      margin: 0 0 6px;
    }

    .header p {
      margin: 0;
      opacity: 0.95;
    }

    .content {
      padding: 20px;
    }

    input, button {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 10px;
      border: 1px solid #d1d5db;
      font-size: 15px;
      box-sizing: border-box;
    }

    button {
      background: #2563eb;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #1d4ed8;
    }

    .msg {
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 15px;
      white-space: pre-wrap;
    }

    .error {
      background: #fef2f2;
      color: #b91c1c;
      border: 1px solid #fecaca;
    }

    .info {
      background: #eff6ff;
      color: #1d4ed8;
      border: 1px solid #bfdbfe;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .small-btn {
      width: auto;
      min-width: 160px;
      margin-bottom: 0;
    }

    .vehicle-card {
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 20px;
      background: #fafafa;
    }

    .vehicle-title {
      margin: 0 0 18px;
      font-size: 30px;
      color: #111827;
    }

    .vehicle-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .field {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 12px;
    }

    .field-label {
      font-size: 12px;
      color: #6b7280;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .field-value {
      font-size: 15px;
      font-weight: 600;
      word-break: break-word;
    }

    .notes, .ficha-box {
      margin-top: 14px;
      padding: 14px;
      border-radius: 12px;
      background: white;
      border: 1px solid #e5e7eb;
      white-space: pre-wrap;
    }

    .badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: bold;
      background: #e5e7eb;
      color: #374151;
    }

    .ficha-box img {
      max-width: 100%;
      height: auto;
      display: block;
      margin-top: 12px;
      border-radius: 10px;
      border: 1px solid #e5e7eb;
      background: white;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      min-width: 850px;
    }

    th, td {
      border-bottom: 1px solid #e5e7eb;
      padding: 10px;
      text-align: left;
      vertical-align: top;
    }

    th {
      background: #f9fafb;
    }

    @media (max-width: 700px) {
      .vehicle-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <div id="loginView" class="box">
    <div class="header">
      <h2>Acceso Automoción</h2>
      <p>Consulta interna de vehículos del taller</p>
    </div>
    <div class="content">
      <input id="username" type="text" placeholder="Usuario" />
      <input id="password" type="password" placeholder="Contraseña" />
      <button onclick="login()">Entrar</button>
      <div id="loginError" class="msg error hidden"></div>
    </div>
  </div>

  <div id="appView" class="box hidden">
    <div class="header">
      <h2>Ficha de vehículo</h2>
      <p id="welcomeText"></p>
    </div>

    <div class="content">
      <div class="topbar">
        <div id="viewModeText">Consulta de vehículo</div>
        <div style="display:flex; gap:10px; flex-wrap:wrap;">
          <button id="showAllBtn" class="small-btn hidden" onclick="showAllVehicles()">Ver todos</button>
          <button class="small-btn" onclick="logout()">Cerrar sesión</button>
        </div>
      </div>

      <div id="appMessage" class="msg info hidden"></div>

      <div id="vehicleDetail"></div>

      <div id="tableContainer" class="table-wrap hidden">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Vehículo</th>
              <th>Color</th>
              <th>VIN</th>
              <th>Estado</th>
              <th>Observaciones</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const USERS = [
      { username: "profesor", password: "auto2026", role: "profesor", name: "Profesorado" },
      { username: "alumno1", password: "auto2026", role: "alumno", name: "Alumno 1" },
      { username: "alumno2", password: "auto2026", role: "alumno", name: "Alumno 2" }
    ];

    const SHEET_ID = "1sf2TS8gCKachrkz66S6E_zQuafVpu7F_AhSLdhi-W-g";
    const SHEET_GID = "0";

    let vehicles = [];

    function login() {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();
      const loginError = document.getElementById("loginError");

      loginError.classList.add("hidden");
      loginError.textContent = "";

      const user = USERS.find(u => u.username === username && u.password === password);

      if (!user) {
        loginError.textContent = "Usuario o contraseña incorrectos.";
        loginError.classList.remove("hidden");
        return;
      }

      sessionStorage.setItem("automocion_user", JSON.stringify(user));
      document.getElementById("loginView").classList.add("hidden");
      document.getElementById("appView").classList.remove("hidden");
      document.getElementById("welcomeText").textContent = "Bienvenido, " + user.name;

      loadVehiclesJSONP();
    }

    function logout() {
      sessionStorage.removeItem("automocion_user");
      document.getElementById("appView").classList.add("hidden");
      document.getElementById("loginView").classList.remove("hidden");
      document.getElementById("username").value = "";
      document.getElementById("password").value = "";
      document.getElementById("vehicleDetail").innerHTML = "";
      document.getElementById("tableBody").innerHTML = "";
      document.getElementById("tableContainer").classList.add("hidden");
      document.getElementById("showAllBtn").classList.add("hidden");
      document.getElementById("appMessage").classList.add("hidden");
    }

    function showAllVehicles() {
      document.getElementById("viewModeText").textContent = "Listado completo de vehículos";
      document.getElementById("vehicleDetail").innerHTML = "";
      document.getElementById("tableContainer").classList.remove("hidden");
      document.getElementById("showAllBtn").classList.add("hidden");
      renderVehiclesTable();
    }

    function loadVehiclesJSONP() {
      const appMessage = document.getElementById("appMessage");
      appMessage.classList.add("hidden");
      appMessage.textContent = "";

      const old = document.getElementById("sheetJsonpScript");
      if (old) old.remove();

      window.handleSheetData = function(response) {
        try {
          const cols = response.table.cols.map((col, index) => {
            const label = (col.label || "").trim();
            return label || `Columna ${index + 1}`;
          });

          const rows = response.table.rows.map(row => {
            const obj = {};
            cols.forEach((colName, index) => {
              obj[colName] = row.c[index] && row.c[index].v != null ? row.c[index].v : "";
            });
            return obj;
          });

          vehicles = rows.map(r => ({
            id: value(r["ID"]),
            qr: value(r["QR"]),
            tailerra: value(r["TAILERRA"]),
            autoa: value(r["Autoa"]),
            color: value(r["Kolorea"]),
            vin: value(r["VIN"]),
            fitxaTeknika: value(r["Fitxa teknika"]),
            egokitua: value(r["Egokitua"]),
            erabilpena: value(r["Erabilpena"]),
            estado: value(r["Egoera"]),
            piztenDu: value(r["Pizten du"]),
            piztuBeharDu: value(r["Piztu behar du"]),
            observaciones: value(r["Oharrak"])
          })).filter(v => v.id !== "");

          if (!vehicles.length) {
            appMessage.textContent = "No se han encontrado vehículos válidos.";
            appMessage.className = "msg error";
            appMessage.classList.remove("hidden");
            return;
          }

          getVehicleFromURL();
        } catch (error) {
          appMessage.textContent = "Error procesando la hoja:\n" + error.message;
          appMessage.className = "msg error";
          appMessage.classList.remove("hidden");
        }
      };

      const script = document.createElement("script");
      script.id = "sheetJsonpScript";
      script.src = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?gid=${SHEET_GID}&tqx=responseHandler:handleSheetData`;
      script.onerror = function() {
        appMessage.textContent = "No se ha podido cargar la hoja desde Google Sheets.";
        appMessage.className = "msg error";
        appMessage.classList.remove("hidden");
      };

      document.body.appendChild(script);
    }

    function getVehicleFromURL() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get("id");

      if (!id) {
        document.getElementById("viewModeText").textContent = "Listado completo de vehículos";
        document.getElementById("tableContainer").classList.remove("hidden");
        renderVehiclesTable();
        return;
      }

      const vehicle = vehicles.find(v => String(v.id) === String(id));

      if (!vehicle) {
        const appMessage = document.getElementById("appMessage");
        appMessage.textContent = "No se ha encontrado ningún vehículo con ese ID.";
        appMessage.className = "msg error";
        appMessage.classList.remove("hidden");
        return;
      }

      renderVehicleDetail(vehicle);
    }

    function renderVehiclesTable() {
      const tableBody = document.getElementById("tableBody");

      tableBody.innerHTML = vehicles.map(v => `
        <tr>
          <td>${escapeHtml(v.id)}</td>
          <td>${escapeHtml(v.autoa)}</td>
          <td>${escapeHtml(v.color)}</td>
          <td>${escapeHtml(v.vin)}</td>
          <td>${escapeHtml(v.estado)}</td>
          <td>${escapeHtml(v.observaciones)}</td>
        </tr>
      `).join("");
    }

    function renderVehicleDetail(vehicle) {
      const detail = document.getElementById("vehicleDetail");
      const tableContainer = document.getElementById("tableContainer");
      const viewModeText = document.getElementById("viewModeText");
      const showAllBtn = document.getElementById("showAllBtn");

      viewModeText.textContent = "Ficha del vehículo";
      tableContainer.classList.add("hidden");
      showAllBtn.classList.remove("hidden");

      detail.innerHTML = `
        <div class="vehicle-card">
          <h2 class="vehicle-title">${escapeHtml(vehicle.autoa || "Vehículo")}</h2>

          <div class="vehicle-grid">
            <div class="field">
              <div class="field-label">ID</div>
              <div class="field-value">${escapeHtml(vehicle.id)}</div>
            </div>

            <div class="field">
              <div class="field-label">Taller</div>
              <div class="field-value">${escapeHtml(vehicle.tailerra)}</div>
            </div>

            <div class="field">
              <div class="field-label">Color</div>
              <div class="field-value">${escapeHtml(vehicle.color)}</div>
            </div>

            <div class="field">
              <div class="field-label">VIN</div>
              <div class="field-value">${escapeHtml(vehicle.vin)}</div>
            </div>

            <div class="field">
              <div class="field-label">Egokitua</div>
              <div class="field-value">${escapeHtml(vehicle.egokitua)}</div>
            </div>

            <div class="field">
              <div class="field-label">Erabilpena</div>
              <div class="field-value">${escapeHtml(vehicle.erabilpena)}</div>
            </div>

            <div class="field">
              <div class="field-label">Estado</div>
              <div class="field-value"><span class="badge">${escapeHtml(vehicle.estado)}</span></div>
            </div>

            <div class="field">
              <div class="field-label">Pizten du</div>
              <div class="field-value">${escapeHtml(vehicle.piztenDu)}</div>
            </div>

            <div class="field">
              <div class="field-label">Piztu behar du</div>
              <div class="field-value">${escapeHtml(vehicle.piztuBeharDu)}</div>
            </div>
          </div>

          <div class="notes"><strong>Observaciones</strong><br>${escapeHtml(vehicle.observaciones || "Sin observaciones.")}</div>

          ${renderFichaTecnica(vehicle.fitxaTeknika)}
        </div>
      `;
    }

    function renderFichaTecnica(fitxaTeknika) {
  if (!fitxaTeknika) {
    return `
      <div class="ficha-box">
        <strong>Ficha técnica</strong><br>
        No disponible.
      </div>
    `;
  }

  // Si ya viene una URL completa
  if (fitxaTeknika.startsWith("http://") || fitxaTeknika.startsWith("https://")) {
    return `
      <div class="ficha-box">
        <strong>Ficha técnica</strong><br><br>
        <a href="${escapeAttr(fitxaTeknika)}" target="_blank" rel="noopener">
          <button type="button" class="small-btn">Ver ficha técnica</button>
        </a>
      </div>
    `;
  }

  // Si es un nombre de archivo dentro de /fichas/
  const ruta = `fichas/${encodeURIComponent(fitxaTeknika)}`;

  return `
    <div class="ficha-box">
      <strong>Ficha técnica</strong><br><br>
      <a href="${ruta}" target="_blank" rel="noopener">
        <button type="button" class="small-btn">Ver ficha técnica</button>
      </a>
    </div>
  `;
}

      if (fitxaTeknika.startsWith("http://") || fitxaTeknika.startsWith("https://")) {
        return `
          <div class="ficha-box">
            <strong>Ficha técnica</strong><br>
            <a href="${escapeAttr(fitxaTeknika)}" target="_blank" rel="noopener">Abrir ficha técnica</a>
          </div>
        `;
      }

      const ruta = `fichas/${encodeURIComponent(fitxaTeknika)}`;

      return `
        <div class="ficha-box">
          <strong>Ficha técnica</strong><br>
          Archivo: ${escapeHtml(fitxaTeknika)}
          <img src="${ruta}" alt="Ficha técnica"
               onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
          <div style="display:none; margin-top:10px;">
            No se ha encontrado la ficha en la carpeta <strong>fichas</strong>.<br>
            Sube el archivo al repositorio dentro de <strong>/fichas</strong>.
          </div>
        </div>
      `;
    }

    function value(v) {
      if (v === undefined || v === null) return "";
      return String(v).trim();
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function escapeAttr(value) {
      return escapeHtml(value);
    }
  </script>
</body>
</html>
